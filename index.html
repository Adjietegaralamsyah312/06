<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render vs DRY Lengkap</title>
    <style>
        body { font-family: Arial; }

        h2 { text-align: center; }

        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: green;
            color: white;
        }

        ul {
            width: 60%;
            margin: 20px auto;
        }

        li {
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 150px;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>TABLE 1 (Render Biasa)</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama</th>
        </tr>
    </thead>
    <tbody id="table-render"></tbody>
</table>

<h2>TABLE 2 (DRY, REUSE, MODULAR)</h2>
<table>
    <thead id="table-head"></thead>
    <tbody id="table-dry"></tbody>
</table>

<h2>LIST 1 (Dari Table 1)</h2>
<ul id="list1"></ul>

<h2>LIST 2 (Dari Table 2)</h2>
<ul id="list2"></ul>

<h2>CARD 1 (Dari Table 1)</h2>
<div class="card-container" id="card1"></div>

<h2>CARD 2 (Dari Table 2)</h2>
<div class="card-container" id="card2"></div>

<script>
/* =====================
   DATA
===================== */
const data = [
    { id: 1, nama: "Andi" },
    { id: 2, nama: "Budi" },
    { id: 3, nama: "Citra" },
    { id: 4, nama: "Dina" }
];

/* =====================
   1. TABLE RENDER BIASA
===================== */
const tableRender = document.getElementById("table-render");

data.forEach(item => {
    tableRender.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.nama}</td>
        </tr>
    `;
});

/* =====================
   2. TABLE DRY MODULAR
===================== */
const columns = [
    { key: "id", label: "ID" },
    { key: "nama", label: "Nama" }
];

function createHeader(cols) {
    return `<tr>${cols.map(c => `<th>${c.label}</th>`).join("")}</tr>`;
}

function createRow(item, cols) {
    return `<tr>${cols.map(c => `<td>${item[c.key]}</td>`).join("")}</tr>`;
}

function renderTable(data, cols) {
    document.getElementById("table-head").innerHTML = createHeader(cols);
    document.getElementById("table-dry").innerHTML =
        data.map(d => createRow(d, cols)).join("");
}

renderTable(data, columns);

/* =====================
   LIST
===================== */
function createList(item) {
    return `<li>${item.id} - ${item.nama}</li>`;
}

// List 1 (dari render biasa)
document.getElementById("list1").innerHTML =
    data.map(d => createList(d)).join("");

// List 2 (dari DRY)
document.getElementById("list2").innerHTML =
    data.map(d => createList(d)).join("");

/* =====================
   CARD
===================== */
function createCard(item) {
    return `
        <div class="card">
            <h3>${item.nama}</h3>
            <p>ID: ${item.id}</p>
        </div>
    `;
}

// Card 1 (dari render biasa)
document.getElementById("card1").innerHTML =
    data.map(d => createCard(d)).join("");

// Card 2 (dari DRY)
document.getElementById("card2").innerHTML =
    data.map(d => createCard(d)).join("");

</script>

</body>
</html>
